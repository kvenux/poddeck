summary: |
  Emotion scientist Dr. Dacher Keltner explains the neuroscience of awe — how shifting perception from "small to vast" triggers measurable health benefits including reduced inflammation, less pain, and better brain health years later. The conversation spans the expanded taxonomy of 20 facial expressions, the role of teasing and embarrassment in group bonding, the loneliness epidemic, music as the fastest path to collective consciousness, and practical awe design for cities and daily life.
core_ideas:
  - Awe is triggered by a perceptual shift from small to vast — in vision, sound, and ideas
  - Weekly awe walks reduce pain, boost vagal tone, and improve brain health six years later
  - Emotions have expanded from 6 to 20 distinct states — 75% overlap across 144 cultures
  - Embarrassment signals moral commitment to the group and builds trust
  - The enemies of awe are self-focus, narcissism, and social media's micro-fragmentation
  - Community confers roughly 10 years of life expectancy — more than any single exercise
