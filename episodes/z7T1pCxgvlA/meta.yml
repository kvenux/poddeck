summary: |
  Ash and Kiriti share hard-won lessons from 50+ AI product deployments across OpenAI, Google, and Amazon. They break down why AI products are fundamentally different from traditional software (non-determinism + agency-control tradeoff), introduce their CCCD framework for iterative AI development, and argue that pain — not speed to market — is the real competitive moat.
core_ideas:
  - AI products differ from traditional software in two key ways — non-deterministic I/O and the agency-control tradeoff
  - Start with high control and low agency (V1), then graduate to autonomy as trust is earned
  - Neither evals nor production monitoring alone will make your AI product reliable — you need both
  - The CCCD framework (Continuous Calibration, Continuous Development) is the AI-era version of CI/CD
  - One-click agents are pure marketing — building real ROI takes 4-6 months of iteration
  - Pain is the new moat — there are no playbooks, and the knowledge built through iteration becomes your competitive advantage
