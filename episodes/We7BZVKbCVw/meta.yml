  - "The product is the model：少 scaffold，多放手；bitter lesson 在产品端的应用"
  - "Build for the model six months from now：前 6 个月 PMF 会很差，然后突然 click"
  - "Underfund everything：少派人 + 多发 token，会得到更多创新而不是更少"
