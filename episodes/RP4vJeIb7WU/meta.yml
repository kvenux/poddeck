summary: |
  Jessica Fain, VP Product at Webflow and former chief of staff to two CPOs at Slack,
  unpacks the art and science of influencing executives — from tactical meeting techniques
  to building long-term trust. She argues influence is the single highest-leverage skill
  for product leaders, especially as AI commoditizes execution.
core_ideas:
  - Influence is not politics — it's increasing the odds your good ideas survive
  - Executives experience their calendar as a strobe light; set 30 seconds of context at the start of every meeting
  - Treat your executive as your key user with curiosity and empathy, not as a rubber stamp
  - Present options (not just one solution), lead with your recommendation, put evidence in the appendix
  - Kill things and deprioritize to build trust — it shows aligned incentives
  - In the AI era, influence and strategy clarity become the 10x skill as execution gets commoditized
