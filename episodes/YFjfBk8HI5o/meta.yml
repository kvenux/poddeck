summary: |
  Peter Steinberger 讲他怎么在 1 小时内把 WhatsApp 接到 Claude Code 的 CLI,
  做出了后来成为 GitHub 史上最快增长仓库的 OpenClaw。围绕这个故事展开的是
  agentic engineering 的心法、self-modifying software、Moldbook 引发的 AI
  psychosis、改名大战、以及他从 PSPDFKit 13 年烧完到重新找回 building 乐趣
  的整条弧线。最后谈到下一步可能加入 Meta 或 OpenAI。
