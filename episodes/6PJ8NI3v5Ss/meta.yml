summary: |
  Professor Renato Renner of ETH Zurich explains his no-go theorem showing quantum
  theory contradicts itself when applied to observers who are themselves quantum systems.
  The conversation covers three incompatible assumptions (universality, consistency, single
  outcomes), a gravity-based escape route involving reference frame loops, the black hole
  information paradox, and why choosing an interpretation of quantum mechanics is ultimately
  an emotional decision.
core_ideas:
  - Quantum theory cannot consistently describe multiple observers who each apply the theory from their own perspective
  - Three assumptions — universality, inter-agent consistency, and single outcomes — cannot all hold simultaneously
  - A possible escape via gravity — reference frame loops may make the contradictory experiment fundamentally impossible to build
  - Probabilities are too restricted a concept to faithfully represent quantum states, breaking cryptographic proofs
  - The measurement problem will become operationally relevant once quantum computers act as agents
  - Physics is fundamentally about communication between agents, not discovering a God's-eye truth
