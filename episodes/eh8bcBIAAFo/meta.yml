summary: |
  Jenny Wen, head of design for Claude at Anthropic (previously director of design at Figma),
  discusses how AI is fundamentally transforming the design profession. She argues the traditional
  design process is dead, replaced by two modes: execution support (pairing with engineers) and
  short-horizon vision-setting. Topics include building trust through speed, three hiring archetypes
  for the AI era, the legibility framework, and why design managers need IC rotations.
core_ideas:
  - The double-diamond design process is dead — engineering speed forced the change, not a design manifesto
  - Designer time allocation shifted from 60-70% mocking to 30-40%, with new slices for engineer pairing and implementation
  - Building trust through speed — ship early as research preview, iterate publicly, respond to feedback
  - Three hiring archetypes — strong generalist (block-shaped), deep specialist (deep T), craft new grad (blank slate)
  - Designers should act like internal VCs — spot illegible ideas with energy, then make them legible
  - AI will get better at taste and judgment, but humans remain accountable for decisions
