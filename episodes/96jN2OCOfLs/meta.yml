summary: |
  Karpathy 在一场炉边对谈里，从"作为程序员从未如此落后"讲起：December 是
  agentic 编码工作流真正开始 work 的拐点。他串起 Software 3.0（编程变成
  prompting）、可验证性如何造就"锯齿状"智能、vibe coding 与 agentic
  engineering 的分野，以及人类仍独一无二负责的"理解"。
core_ideas:
  - December 是一个"stark transition"——他记不清上次纠正 agent 是什么时候
  - Software 3.0：LLM 成为可编程计算机，context window 是操纵它的杠杆
  - LLM 能自动化"你能验证的东西"，因此能力是 jagged 的（会让你走路去洗车）
  - 你在"实验室的摆布之下"——能力取决于他们往数据分布里放了什么
  - vibe coding 抬高地板；agentic engineering 守住专业软件的质量线
  - 我们不是在造动物，而是在召唤幽灵——这改变你怎么用它
  - 能外包思考，不能外包理解——理解仍是人类独有的瓶颈
