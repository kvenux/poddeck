summary: |
  Claire Vo shares her journey from vocal OpenClaw skeptic to running 9 specialized agents
  across 3 Mac Minis. She explains how management skills translate directly to agent management,
  demonstrates real use cases from sales automation to family logistics, and provides practical
  setup and security advice.
core_ideas:
  - Multiple specialized agents beat one general-purpose agent due to context overload
  - Treat agent setup like employee onboarding — role scoping, progressive trust, org design
  - Sam the sales agent replaced 10 hours/week of paid human work with real economic value
  - The open source nature of OpenClaw makes it decomposable and a learning tool for AI builders
  - Security through physical isolation and progressive trust mirrors real-world assistant management
  - The web is hostile to agents — prefer APIs, and reframe problems when browser automation fails
