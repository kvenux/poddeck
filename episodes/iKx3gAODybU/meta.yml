summary: |
  历史学家 Lars Brownworth 用 1.5 小时把 793–1066 年的 Viking 时代拆给你看：
  从 Lindisfarne 那场让欧洲修士相信"世界末日来了"的袭击，到长船 70–120 mi/day 的恐怖速度，
  再到 Ragnar、Valhalla、Berserkers、Leif Erikson 的 Vinland、东到 Constantinople 的
  Varangian Guard。最后落到一个反差：这个 destroyer 民族只用了三代人就变成 builder，
  造出了 Normandy、Kievan Rus 与现代欧洲的雏形。
core_ideas:
  - "Lindisfarne 793 是欧洲心理崩塌的起点：海可以带来威胁、连修道院都不再 sacred"
  - "Vikings 的真正秘密武器是长船——70–120 mi/day，吃水 < 2 ft，可入河可跨洋"
  - "他们不是 dumb brutes：先做侦察、专挑 high holy days、用恐惧做战略武器"
  - "扁平 / meritocratic / ring-giver 文化：'We have no king. We are all kings.'"
  - "宗教是 social tech：Valhalla 是无限训练、Ragnarok 必输、Hospitality 被神化"
  - "Leif Erikson 比 Columbus 早 500 年到 Vinland，却因 husbandry 死板 + 补给太远 + 原住民抵抗 撤了"
  - "Creative destruction：Vikings 死掉自己，留下 Normandy → 现代英法的原型"
