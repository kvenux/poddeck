summary: |
  Simon Willison (co-creator of Django, coined "prompt injection") talks with Lenny Rachitsky
  about the November 2025 inflection point when coding agents crossed a reliability threshold,
  the dark factory pattern where nobody writes or reads code, and the lethal trifecta of AI security risks.
core_ideas:
  - November inflection — GPT 5.1 and Claude Opus 4.5 crossed the threshold from mostly-works to almost-always-works
  - Dark factory pattern — StrongDM experiments with nobody-writes-nobody-reads-code using AI QA swarms
  - Lethal trifecta — private data + malicious instructions + exfiltration = catastrophic prompt injection
  - Mid-career squeeze — Thoughtworks found AI helps seniors and juniors most, squeezes the middle
  - Agentic engineering patterns — red/green TDD, knowledge hoarding, template-first projects
  - OpenClaw went from first line of code to Super Bowl ad in 3.5 months, exposing massive demand for personal AI assistants
