summary: |
  Anthropic 增长负责人 Amol Avasari 分享了公司 14 个月内从 $1B 到 $19B ARR 的增长故事、
  用 Claude 自动化增长实验的 CASH 项目、PM 角色在 AI 时代的演变，以及他从严重脑损伤中
  恢复并成为顶级增长领导者的个人经历。
core_ideas:
  - Anthropic 的 10x 年复合增长源自极度聚焦（coding + B2B）和约束驱动的战略
  - CASH 项目让 Claude 自动跑增长实验，当前水平约等于初级 PM，但几个月前完全不可能
  - Claude Code 给工程师 2-3x 杠杆，导致 PM 和设计被挤压，但 PM 角色反而可能需要更多人
  - 好的摩擦（帮用户理解产品为什么适合自己）比一味追求极简漏斗更有效
  - 安全不是增长的对立面 — Anthropic 主动放弃短期收入以维护品牌和用户信任
  - 约束带来自由 — 无论是公司战略还是个人经历（脑损伤后的恢复）
