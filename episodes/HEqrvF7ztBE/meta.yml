summary: |
  Lenny Rachitsky's wife Michelle Rial turns the tables and interviews him about how he went
  from an Airbnb PM to building a 1.2 million subscriber newsletter and top-10 tech podcast.
  He shares never-before-told stories including a psychedelic experience that gave him confidence
  to write, the fraud crisis that nearly broke his business, and why he revises each post ~50 times.
core_ideas:
  - Following pull rather than a grand plan led to an unexpected career as a top creator
  - The Venn diagram of enjoyment, skill, and audience value is the key signal to double down
  - The Indiana Jones boulder metaphor captures the relentless treadmill of weekly content
  - Iteration is the real secret — Lenny does ~50 revision passes per newsletter post
  - Best content comes from practitioners doing the thing, not people pontificating
  - You can accidentally create a job you hate by chasing every opportunity
