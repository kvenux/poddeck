summary: |
  Michael Nielsen and Dwarkesh Patel explore how scientific progress actually happens —
  from the messy reality of falsification to hostile verification loops that mislead for decades.
  They discuss why the tech tree is far vaster than we realize, why alien civilizations would
  develop radically different technologies, and what this means for AI-accelerated science.
core_ideas:
  - Falsification in science is far messier than textbooks suggest — the real history of Michelson-Morley, Lorentz, and Poincaré shows how complicated it is
  - Verification loops in science can be actively hostile for decades, as with Prout's isotope hypothesis
  - The science and technology tree is vastly larger than we have explored — different civilizations would end up in entirely different branches
  - AlphaFold may represent a new type of scientific object, not explanation in the classic sense
  - AI shifts the bottleneck from producing code to having interesting design ideas
  - Being stuck and doing hard thinking may be essential for deep learning — AI chatbots risk undermining this
