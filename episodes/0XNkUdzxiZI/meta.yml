summary: |
  Lovable 首位官方 Vibe Coding 工程师 Lazar Yavanovich 分享了一套完整的职业 vibe coding 方法论：
  从平行构建 5 个项目获取 clarity，到 PRD 文档系统和 4x4 调试框架，再到为什么设计品味和判断力
  将成为 AI 时代最稀缺的技能。
core_ideas:
  - 80% 时间花在规划和对话，只有 20% 执行——clarity 是核心竞争力
  - 同时启动 5 个平行项目来获取 clarity，而非在一个方向上死磕
  - 用 PRD 系统（master plan / implementation plan / design guidelines / user journeys / tasks.md）外化上下文
  - 4x4 调试框架——auto-fix / console logs / external tool / revert + rethink
  - PM 赢了今天，设计师赢明天，精英工程师永远需要
  - 不要优化 tech stack，要优化 judgment、taste、design、copy
