summary: |
  SemiAnalysis CEO Dylan Patel walks through the entire AI compute supply chain,
  from $600B hyperscaler capex to the 3.5 EUV tools needed per gigawatt. He explains
  why semiconductors — not power — are the real bottleneck, and what that means for
  the US-China AI race, memory prices, and consumer electronics.
core_ideas:
  - The semiconductor supply chain (EUV tools, memory, logic wafers) is the ultimate bottleneck for AI scaling, not power or data centers
  - 3.5 EUV tools per gigawatt means ~200 GW ceiling by 2030 with ~700 total tools
  - Anthropic was too conservative on compute commitments while OpenAI locked in 5-year deals early
  - Memory prices tripling will crush consumer electronics — smartphone volumes may halve
  - Fast AI timelines favor the US; slow timelines give China time to build an indigenized supply chain
  - Space data centers are not viable this decade because chips, not energy, are the constraint
