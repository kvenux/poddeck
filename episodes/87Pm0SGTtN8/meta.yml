summary: |
  Marc Andreessen argues AI arrives at a miraculously well-timed moment — just as
  productivity growth has stagnated for 50 years and global population is declining.
  He unpacks the "Mexican standoff" between PMs, engineers, and designers, explains
  why task loss matters more than job loss, and makes the case for indeterminate optimism.
core_ideas:
  - AI is the philosopher's stone — transforming sand (silicon) into thought
  - 50 years of slow productivity growth means AI enters a world that desperately needs it
  - Demographic decline + AI timing = human workers at a premium, not a discount
  - The PM/engineer/designer Mexican standoff — all three roles are converging via AI
  - Being good at 2-3 things has super-additive returns (Scott Adams principle)
  - AI moats are unknowable — the industry is a complex adaptive system still in discovery
