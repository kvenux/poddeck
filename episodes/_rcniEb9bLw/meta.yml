summary: |
  Applied Intuition CEO Qasar Younis 首次公开访谈。他认为 AI 真正的影响不在软件开发，
  而在农业、矿业、建筑和卡车运输等物理行业。对谈涵盖 Physical AI 路线、
  中国竞争的误读、创始人的沉默哲学、以及一家近十年未花过融资的 $15B 公司如何运营。
core_ideas:
  - Physical AI 的真正影响在 farming、mining、construction、trucking，不在开发者工具
  - AI 恐惧的根源是误解——花时间了解技术你就会看到它的局限
  - 农民平均年龄 58 岁、卡车司机招不到人——AI 是及时雨，不是工作杀手
  - 中美竞争不是公司对公司，而是公司对政府——华为不是苹果
  - Applied Intuition 的沉默哲学：our best work is done alone and quietly
  - Radical pragmatism 和 cleaning zen——从打扫办公室到写好代码的一条直线
