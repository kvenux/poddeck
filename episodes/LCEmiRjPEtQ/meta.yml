summary: |
  Karpathy 在 YC AI Startup School 的演讲：软件 70 年没怎么变，却在最近几年被快速改写了两次——
  从 Software 1.0（代码）到 2.0（神经网络权重）再到 3.0（英文 prompt）。他用一连串类比拆解 LLM：
  它像电网、像晶圆厂，但最像停留在 1960 年代的操作系统；它是有一身认知缺陷的"人类幽灵"。
  最后落到怎么和它一起工作——部分自治应用、自治滑块、生成-验证循环，以及为 Agent 重写基础设施。
core_ideas:
  - Software 1.0 / 2.0 / 3.0 三种编程范式并存，进入行业要对三者都流利
  - LLM 最像操作系统，且仍停在计算的 1960 年代——分时、云端、个人计算革命尚未发生
  - 技术扩散方向被翻转：消费者先用，政府和大公司反而落后
  - LLM 是"people spirits"：有百科全书式记忆，也有幻觉、jagged intelligence、顺行性遗忘
  - 和 AI 协作的关键是加速验证（GUI）+ 把 AI 拴在绳子上（小步增量）
  - 2025 不是 Agent 元年，而是 Agent 的十年——少造机器人，多造 Iron Man 战衣
