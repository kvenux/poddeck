summary: |
  Dr. Marc Breedlove explains how prenatal testosterone shapes sexual orientation,
  the fraternal birth order effect, gay rams, brain sexual dimorphisms, and why
  sexual orientation is not a choice — through the lens of decades of biological research.
core_ideas:
  - Prenatal testosterone leaves measurable body traces (digit ratios, otoacoustic emissions) that correlate with sexual orientation at the group level
  - Each older biological brother increases a boys odds of being gay by ~33% via a maternal immune mechanism targeting neuroligin-4Y
  - Gay rams in Chucks Roselli study never mount females, pointing to an aversion circuit — not just missing attraction
  - Simon LeVays INAH-3 finding (smaller in gay men) was replicated by skeptics, but causation direction remains unknown
  - Women show more plasticity in sexual orientation; men may have a stronger aversion pathway
  - There is no single cause of sexual orientation — multiple biological and developmental pathways converge
