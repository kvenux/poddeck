summary: |
  Dr. Jenny Wagner explains why gravitational lensing data only constrains local
  properties of mass distributions, making every grand dark matter map a model-driven
  extrapolation. She argues the inverse problem approach — reasoning from data to
  necessary models — could reshape cosmology and the scientific method itself.
core_ideas:
  - Gravitational lensing data provides only local information — distortion directions and relative magnification — not global mass distributions
  - Most converging evidence for dark matter shares overlapping model assumptions, making it less independent than it appears
  - The 2025 James Webb reanalysis of the Bullet Cluster and Wagners model-independent analysis of Abell 3827 both show dark-matter offsets were model artifacts
  - Cosmology fails all three of Hassabis criteria for successful AI applications — unknown feature space, no clear goal function, insufficient real training data
  - The inverse problem approach builds a tree of necessary models where errors only fall back one level, unlike forward modeling which can send you back to square zero
  - Multiple 5-sigma anomalies hint at violations of the cosmological principle, suggesting the universe is more complex than a spherical cow
