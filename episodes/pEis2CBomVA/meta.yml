summary: |
  Jacob Warwick, a professional negotiator who has helped clients secure over $1 billion in
  additional comp, shares the psychology and tactics behind compensation negotiation. From simple
  pushbacks that yield 20% more to strategic approaches averaging 40% movement, he reveals how
  information asymmetry, emotional intelligence, and creative deal structures can transform careers.
core_ideas:
  - A simple pushback yields ~20% more comp; strategic negotiation averages ~40% movement
  - Negotiation starts long before the offer — your LinkedIn profile and recruiter conversations set the anchor
  - Never negotiate over email — control tone through video or in-person conversations
  - Treat interviews like enterprise sales — discovery first, numbers last
  - Companies have massive information advantage; use curiosity and empathy to close the gap
  - Performance-based triggers and creative comp structures expand the pie for everyone
