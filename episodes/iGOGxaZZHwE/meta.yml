summary: |
  Professor JB Manchak proves that no amount of empirical data — even from every point
  in the universe — can determine its global structure. He introduces Heraclitus spacetimes
  (maximally asymmetric universes where local structure determines global structure),
  and draws surprising parallels between cosmic underdetermination and Zen Buddhist non-self.
core_ideas:
  - Science can prove its own limits — Manchak's unknowability theorem shows empirical data cannot pin down the global structure of spacetime
  - GR is not one theory but a family of model collections, and which models are physically reasonable remains forever unsettled
  - Heraclitus spacetimes (every event uniquely different) rescue knowability by making local structure equivalent to global structure
  - Malament-Hogarth spacetimes can in principle solve the halting problem, but blue shift and other objections remain contested
  - The symmetry-structure dogma breaks down at maximum asymmetry — Heraclitus spacetimes challenge decades of philosophical assumptions
  - Manchak connects cosmic underdetermination to Hume and Zen Buddhism — both involve the impossibility of grasping the whole from the parts
