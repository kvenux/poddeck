summary: |
  Andrej Karpathy 做客 No Priors，描述他这几个月每天 16 小时"对 agents 表达意图"的真实状态：
  编程不再是写代码，瓶颈从算力变成了人自己，做不成事往往是 skill issue 而非 capability issue。
  对谈延伸到 AutoResearch、家庭智能体 Dobby、软件退化成 API endpoints、模型的锯齿状智能与物种化、
  Folding@home 式的开放研究，以及"把如何解释编码进 agent"的新教育形态。
core_ideas:
  - 编程的本质已变成"表达意图"——你像项目的总调度，在 repo 和 agents 之间派活、审查、合并
  - 瓶颈不再是算力而是你自己——只要 token / 订阅 / compute 没跑满，你就是系统瓶颈
  - 很多问题是 skill issue 不是 capability issue——上限被炸开，差的是用它的功夫
  - AutoResearch 的动机是把自己移出循环，但前提是有一个能被清晰评估的客观指标
  - 模型是锯齿状智能——既像博士生又像十岁小孩；coding 变强不等于全面变强
  - 数字世界先沸腾、物理世界更慢，软件可能退化成被 agent 调用的 API endpoints
